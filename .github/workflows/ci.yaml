name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          cd mobilebank-app
          docker build -t mobilebank-api:${{ github.sha }} .
          docker tag mobilebank-api:${{ github.sha }} mobilebank-api:latest

      - name: Test image
        run: |
          docker run --rm mobilebank-api:latest python -m pytest || echo "No tests yet"

      - name: Docker image info
        run: docker images | grep mobilebank-api
