name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./mobilebank-app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mobilebank-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/mobilebank-api:latest
      
      - name: Image pushed successfully
        run: echo "✅ Image pushed to Docker Hub as ${{ secrets.DOCKER_USERNAME }}/mobilebank-api:latest"
