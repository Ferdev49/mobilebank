# Ingress para MobileBank API
# Requiere NGINX Ingress Controller instalado en el cluster
# Instalar con: scripts/install-ingress.sh
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mobilebank-api
  namespace: mobilebank
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Rate limiting basico (requests por segundo por IP)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: mobilebank.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mobilebank-api
                port:
                  number: 80
