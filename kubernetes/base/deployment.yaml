apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobilebank-api
  namespace: mobilebank
  labels:
    app: mobilebank-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobilebank-api
  template:
    metadata:
      labels:
        app: mobilebank-api
    spec:
      containers:
      - name: mobilebank-api
        image: ferdev49/mobilebank-api:latest
        ports:
        - containerPort: 5000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
