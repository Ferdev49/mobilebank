# ConfigMap para MobileBank API
# Configuracion no-sensible inyectada como variables de entorno
apiVersion: v1
kind: ConfigMap
metadata:
  name: mobilebank-config
  namespace: mobilebank
data:
  ENVIRONMENT: "base"
  LOG_LEVEL: "INFO"
  PORT: "5000"
  DEBUG: "False"
  FEATURE_TRANSFER_ENABLED: "true"
  FEATURE_METRICS_ENABLED: "true"
  MAX_TRANSFER_AMOUNT: "10000"
  HEALTH_CHECK_PATH: "/health"
