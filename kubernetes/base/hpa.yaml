# Horizontal Pod Autoscaler para MobileBank API
# Requiere metrics-server instalado en el cluster
# Instalar con: scripts/install-metrics-server.sh
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mobilebank-api
  namespace: mobilebank
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mobilebank-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min
