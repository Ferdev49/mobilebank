apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers:
            - severity = critical
          receiver: critical

    receivers:
      - name: default
        webhook_configs:
          - url: http://webhook-receiver.observability.svc:5001/
            send_resolved: true
      - name: critical
        webhook_configs:
          - url: http://webhook-receiver.observability.svc:5001/critical
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace']
