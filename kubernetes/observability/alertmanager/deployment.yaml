apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.external-url=http://alertmanager.mobilebank.local
          ports:
            - { containerPort: 9093, name: http }
            - { containerPort: 9094, name: cluster }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9093 }
            initialDelaySeconds: 30
          readinessProbe:
            httpGet: { path: /-/ready, port: 9093 }
            initialDelaySeconds: 5
          volumeMounts:
            - { name: config, mountPath: /etc/alertmanager }
            - { name: storage, mountPath: /alertmanager }
      volumes:
        - { name: config, configMap: { name: alertmanager-config } }
        - { name: storage, persistentVolumeClaim: { claimName: alertmanager-data } }
