apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: observability
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: loki
          image: grafana/loki:3.1.1
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - { containerPort: 3100, name: http }
            - { containerPort: 9096, name: grpc }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          livenessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 45
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 15
          volumeMounts:
            - { name: config, mountPath: /etc/loki }
            - { name: storage, mountPath: /loki }
      volumes:
        - { name: config, configMap: { name: loki-config } }
        - { name: storage, persistentVolumeClaim: { claimName: loki-data } }
