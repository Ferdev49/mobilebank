# Self-signed issuer (lab / dev clusters sin dominio publico)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# CA root para emitir certs internos del cluster
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mobilebank-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: mobilebank-internal-ca
  secretName: mobilebank-ca-key-pair
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# ClusterIssuer que usa esa CA para los certs del lab
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: mobilebank-ca-issuer
spec:
  ca:
    secretName: mobilebank-ca-key-pair
---
