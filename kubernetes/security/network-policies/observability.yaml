# Observability necesita poder llegar a TODOS los pods (Prometheus scrape).
# Pero restringimos quien puede llegar a Grafana/Prometheus/Alertmanager UIs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-egress-all
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes: [Egress]
  egress:
    - {} # all
---
# Promtail tambien necesita egress a Loki + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: promtail-egress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: promtail
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: loki
      ports: [{ protocol: TCP, port: 3100 }]
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
