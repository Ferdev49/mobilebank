# Pod Security Standards via labels en el namespace.
# enforce: bloquea creacion de pods que violen el nivel.
# audit/warn: avisa pero no bloquea.
# Niveles: privileged < baseline < restricted
apiVersion: v1
kind: Namespace
metadata:
  name: mobilebank-staging
  labels:
    # Restricted: el mas estricto. Requiere runAsNonRoot, capabilities drop, etc.
    pod-security.kubernetes.io/enforce: "baseline"
    pod-security.kubernetes.io/enforce-version: "v1.30"
    pod-security.kubernetes.io/audit: "restricted"
    pod-security.kubernetes.io/audit-version: "v1.30"
    pod-security.kubernetes.io/warn: "restricted"
    pod-security.kubernetes.io/warn-version: "v1.30"
---
apiVersion: v1
kind: Namespace
metadata:
  name: mobilebank-production
  labels:
    # Production: enforce restricted directamente.
    pod-security.kubernetes.io/enforce: "restricted"
    pod-security.kubernetes.io/enforce-version: "v1.30"
    pod-security.kubernetes.io/audit: "restricted"
    pod-security.kubernetes.io/audit-version: "v1.30"
    pod-security.kubernetes.io/warn: "restricted"
    pod-security.kubernetes.io/warn-version: "v1.30"
